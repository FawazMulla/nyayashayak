{% extends "base.html" %}
{% block title %}Password Updated — Nyaya Sahayak{% endblock %}

{% block content %}
<div class="auth-wrap">

    <div class="auth-logo"><span class="dot"></span>Nyaya Sahayak</div>
    <div style="font-size:2.5rem;margin-bottom:16px;color:var(--neon);">✓</div>
    <div class="auth-title">Password Updated</div>
    <p style="font-size:13px;color:var(--silver);line-height:1.7;margin-bottom:24px;">
      Your password has been set successfully. You can now log in.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
  </div>
</div>
{% endblock %}
