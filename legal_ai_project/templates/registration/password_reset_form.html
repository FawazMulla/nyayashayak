{% extends "base.html" %}
{% block title %}Reset Password — Nyaya Sahayak{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><span class="dot"></span>Nyaya Sahayak</div>
    <div class="auth-title">Reset Password</div>
    <div class="auth-sub">Enter your email and we'll send a reset link.</div>

    <form method="post">
      {% csrf_token %}
      <div class="field-group" style="margin-bottom:24px;">
        <label class="field-label">Email Address</label>
        <input type="email" name="email" class="field-input" required autofocus placeholder="your@email.com"/>
      </div>
      <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>

    <div class="auth-footer"><a href="{% url 'login' %}">Back to Login</a></div>
  </div>
</div>
{% endblock %}
