{% extends "base.html" %}
{% block title %}Email Sent — Nyaya Sahayak{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="text-align:center;">
    <div class="auth-logo"><span class="dot"></span>Nyaya Sahayak</div>
    <div style="font-size:2.5rem;margin-bottom:16px;">📧</div>
    <div class="auth-title">Check your email</div>
    <p style="font-size:13px;color:var(--silver);line-height:1.7;margin-bottom:24px;">
      We've sent a password reset link to your email address. Check your inbox and follow the instructions.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
  </div>
</div>
{% endblock %}
